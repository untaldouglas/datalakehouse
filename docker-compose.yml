version: '3.8'

# ============================================================
# Universidad Data Lakehouse
# Stack: Moodle + ERPNext → Airflow → Nessie + MinIO (Iceberg)
#        → Dremio → PostgreSQL Semantic → Metabase
# Memory profile: optimised for 8 GB Docker Desktop
# ============================================================

networks:
  lakehouse-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  moodle_data:
  moodle_db_data:
  erpnext_db_data:
  minio_data:
  nessie_data:
  dremio_data:
  airflow_db_data:
  airflow_logs:
  metabase_db_data:

# ============================================================
x-airflow-common: &airflow-common
  build:
    context: ./pipelines
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@airflow-db/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__WEBSERVER__WORKERS: '2'
    # Source systems
    MOODLE_DB_HOST: moodle-db
    MOODLE_DB_PORT: "3306"
    MOODLE_DB_NAME: ${MOODLE_DB_NAME}
    MOODLE_DB_USER: ${MOODLE_DB_USER}
    MOODLE_DB_PASSWORD: ${MOODLE_DB_PASSWORD}
    ERPNEXT_DB_HOST: erpnext-db
    ERPNEXT_DB_PORT: "3306"
    ERPNEXT_DB_NAME: ${ERPNEXT_DB_NAME}
    ERPNEXT_DB_USER: ${ERPNEXT_DB_USER}
    ERPNEXT_DB_PASSWORD: ${ERPNEXT_DB_PASSWORD}
    # Lakehouse
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
    MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    NESSIE_URI: http://nessie:19120/api/v1
    LAKEHOUSE_BUCKET: ${MINIO_BUCKET_LAKEHOUSE}
    # Semantic layer
    SEMANTIC_DB_HOST: metabase-db
    SEMANTIC_DB_PORT: "5432"
    SEMANTIC_DB_NAME: ${SEMANTIC_DB_NAME}
    SEMANTIC_DB_USER: ${SEMANTIC_DB_USER}
    SEMANTIC_DB_PASSWORD: ${SEMANTIC_DB_PASSWORD}
    # ETL config
    ETL_SCHEDULE_INTERVAL: ${ETL_SCHEDULE_INTERVAL}
    ETL_LOOKBACK_HOURS: ${ETL_LOOKBACK_HOURS}
    NUM_STUDENTS: ${NUM_STUDENTS}
    UNIVERSITY_NAME: ${UNIVERSITY_NAME}
  volumes:
    - ./pipelines/dags:/opt/airflow/dags
    - ./pipelines/scripts:/opt/airflow/scripts
    - airflow_logs:/opt/airflow/logs
  networks:
    - lakehouse-net
  depends_on:
    airflow-db:
      condition: service_healthy

services:

  # ============================================================
  # SOURCE SYSTEMS
  # ============================================================

  moodle-db:
    image: mysql:8.0
    container_name: moodle-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MOODLE_DB_NAME}
      MYSQL_USER: ${MOODLE_DB_USER}
      MYSQL_PASSWORD: ${MOODLE_DB_PASSWORD}
      MYSQL_INNODB_BUFFER_POOL_SIZE: 134217728
    command:
      - --innodb-buffer-pool-size=128M
      - --max-connections=100
      - --performance-schema=OFF
    volumes:
      - moodle_db_data:/var/lib/mysql
      - ./services/moodle/init:/docker-entrypoint-initdb.d:ro
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    mem_limit: 192m
    restart: unless-stopped

  # NOTE: Moodle app container is optional — the DB schema is initialised above.
  # To run the full Moodle UI, pull the image manually:
  #   docker pull moodlehq/moodle-php-apache:8.2
  # and uncomment the service below (requires 16 GB Docker RAM).
  # moodle:
  #   image: moodlehq/moodle-php-apache:8.2
  #   ports: ["${MOODLE_PORT}:80"]

  erpnext-db:
    image: mariadb:10.6
    container_name: erpnext-db
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --lower_case_table_names=1
      - --innodb-buffer-pool-size=128M
      - --max-connections=100
      - --performance-schema=OFF
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${ERPNEXT_DB_NAME}
      MYSQL_USER: ${ERPNEXT_DB_USER}
      MYSQL_PASSWORD: ${ERPNEXT_DB_PASSWORD}
    volumes:
      - erpnext_db_data:/var/lib/mysql
      - ./services/erpnext/init:/docker-entrypoint-initdb.d:ro
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    mem_limit: 256m
    restart: unless-stopped

  # ============================================================
  # DATA LAKEHOUSE LAYER
  # ============================================================

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    mem_limit: 192m
    restart: unless-stopped

  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - lakehouse-net
    entrypoint: /bin/sh
    command: >
      -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/${MINIO_BUCKET_LAKEHOUSE} &&
        mc mb --ignore-existing local/nessie-data &&
        echo 'MinIO buckets ready'
      "
    restart: on-failure

  nessie:
    image: ghcr.io/projectnessie/nessie:${NESSIE_VERSION}
    container_name: nessie
    depends_on:
      - minio-setup
    environment:
      QUARKUS_PROFILE: prod
      NESSIE_VERSION_STORE_TYPE: ROCKSDB
      NESSIE_ROCKSDB_DATABASE_PATH: /nessie/rocksdb
      QUARKUS_HTTP_PORT: "19120"
      # Iceberg REST catalog configuration (requires Nessie 0.108.0+)
      NESSIE_CATALOG_DEFAULT_WAREHOUSE: ${MINIO_BUCKET_LAKEHOUSE}
      NESSIE_CATALOG_WAREHOUSES__LAKEHOUSE__LOCATION: s3://${MINIO_BUCKET_LAKEHOUSE}/
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT: http://minio:9000
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS: "true"
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION: us-east-1
      # S3 credentials - resolved via mounted application.properties below
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${NESSIE_PORT}:19120"
    volumes:
      - nessie_data:/nessie/rocksdb
      - ./services/nessie/application.properties:/deployments/config/application.properties:ro
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 45s
    mem_limit: 384m
    restart: unless-stopped

  dremio:
    image: dremio/dremio-oss:25.0
    container_name: dremio
    depends_on:
      nessie:
        condition: service_healthy
    environment:
      DREMIO_MAX_MEMORY_SIZE_MB: "4096"
    ports:
      - "${DREMIO_UI_PORT}:9047"
      - "${DREMIO_JDBC_PORT}:31010"
      - "${DREMIO_FLIGHT_PORT}:32010"
    volumes:
      - dremio_data:/opt/dremio/data
      - ./services/dremio/dremio.conf:/opt/dremio/conf/dremio.conf:ro
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9047/apiv2/server_status"]
      interval: 30s
      timeout: 20s
      retries: 20
      start_period: 120s
    mem_limit: 5g
    restart: unless-stopped

  # ============================================================
  # ORCHESTRATION (Apache Airflow)
  # ============================================================

  airflow-db:
    image: postgres:15-alpine
    container_name: airflow-db
    environment:
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 128m
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create --username "${AIRFLOW_ADMIN_USER}" --password "${AIRFLOW_ADMIN_PASSWORD}" --firstname Admin --lastname Universidad --role Admin --email "${MOODLE_ADMIN_EMAIL}" 2>/dev/null || true &&
        echo 'Airflow init done'
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: airflow webserver
    ports:
      - "${AIRFLOW_PORT}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: 768m
    restart: unless-stopped
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: airflow scheduler
    mem_limit: 1g
    restart: unless-stopped
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ============================================================
  # ANALYTICS LAYER
  # ============================================================

  metabase-db:
    image: postgres:15-alpine
    container_name: metabase-db
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: ${METABASE_DB_USER}
      POSTGRES_PASSWORD: ${METABASE_DB_PASSWORD}
    volumes:
      - metabase_db_data:/var/lib/postgresql/data
      - ./services/metabase/init:/docker-entrypoint-initdb.d:ro
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METABASE_DB_USER} -d metabase"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 256m
    restart: unless-stopped

  metabase:
    image: metabase/metabase:${METABASE_VERSION}
    container_name: metabase
    depends_on:
      metabase-db:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: "5432"
      MB_DB_USER: ${METABASE_DB_USER}
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_HOST: metabase-db
      MB_SITE_NAME: "${UNIVERSITY_NAME} Analytics"
      MB_SITE_URL: "http://localhost:${METABASE_PORT}"
      JAVA_TIMEZONE: ${TIMEZONE}
      JAVA_OPTS: "-Xmx896m -Xms256m"
    ports:
      - "${METABASE_PORT}:3000"
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 90s
    mem_limit: 1g
    restart: unless-stopped

  # ============================================================
  # DATA SEEDER (one-shot, can be re-run with: docker compose run data-seeder)
  # ============================================================

  data-seeder:
    <<: *airflow-common
    container_name: data-seeder
    command: python /opt/airflow/scripts/seed_data.py
    depends_on:
      moodle-db:
        condition: service_healthy
      erpnext-db:
        condition: service_healthy
      nessie:
        condition: service_healthy
    restart: "no"
